<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meine Website</title>

  <!-- Google AdSense -->
  <script async
    src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4399649335949053"
    crossorigin="anonymous"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      margin: 0;
      padding: 0;
      text-align: center;
    }

    header {
      background: #222;
      padding: 30px;
      font-size: 32px;
      font-weight: bold;
    }

    main {
      padding: 40px 20px;
    }

    .card {
      background: #1d1d1d;
      padding: 25px;
      border-radius: 12px;
      max-width: 700px;
      margin: auto;
      box-shadow: 0 0 10px rgba(255,255,255,0.1);
    }

    h1 {
      margin-top: 0;
    }

    p {
      line-height: 1.6;
      font-size: 18px;
    }

    footer {
      margin-top: 50px;
      padding: 20px;
      background: #222;
      color: #aaa;
    }

    .ads {
      margin: 40px auto;
      max-width: 900px;
    }
  </style>
</head>
<body>

  <header>
    Meine Website
  </header>

  <main>

    <div class="card">
      <h1>Willkommen 👋</h1>

      <p>
        Das ist meine erste Website mit Google AdSense Werbung.
      </p>

      <p>
        Diese Seite läuft kostenlos auf GitHub Pages oder Neocities.
      </p>
    </div>

    <!-- Werbung -->
    <div class="ads">

      <ins class="adsbygoogle"
           style="display:block"
           data-ad-client="ca-pub-4399649335949053"
           data-ad-slot="4029561725"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>

      <script>
           (adsbygoogle = window.adsbygoogle || []).push({});
      </script>

    </div>

  </main>

  <footer>
    © 2026 Meine Website
  </footer>

</body>
</html>
